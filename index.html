<!DOCTYPE html>
<!-- HTML5 文件聲明 -->
<html lang="zh-TW">
<!-- 設置語言為繁體中文 -->
<head>
<!-- 頁面頭部，包含元數據和樣式 -->
<meta charset="UTF-8">
<!-- 設置字符編碼為 UTF-8 -->
<title>我的數位基地</title>
<!-- 頁面標題 -->

<style>
/* 全局樣式設置 */
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
}

/* 頁面頭部樣式 */
header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  background: #020617;
}

/* 容器樣式，使用網格佈局 */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 15px;
}

/* 卡片樣式 */
.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
}

/* 卡片標題樣式 */
h2 {
  margin: 0 0 10px;
  font-size: 18px;
}

/* 任務項目樣式，可點擊 */
.task {
  cursor: pointer;
  margin: 5px 0;
}

/* 完成任務樣式 */
.done {
  text-decoration: line-through;
  color: #22c55e;
}

/* 進度條容器 */
.bar {
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin: 5px 0;
}

/* 進度條填充 */
.fill {
  height: 10px;
  width: 0;
  background: #38bdf8;
  transition: 1s;
}

/* 經驗值盒子 */
.expBox {
  margin-top: 10px;
}

/* 經驗值條 */
.expBar {
  height: 12px;
  background: #22c55e;
  width: 0%;
  transition: 0.5s;
}

/* 按鈕樣式 */
button {
  margin-top: 8px;
  padding: 5px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* 連結樣式 */
a {
  color: #38bdf8;
  display: block;
}
</style>
</head>

<body>
<!-- 頁面主體內容 -->

<header>🚀 我的數位基地</header>
<!-- 頁面標題頭部 -->

<div class="container">
<!-- 主要內容容器，使用網格佈局 -->

<!-- 👤 狀態卡片 -->
<div class="card">
  <h2>👤 狀態</h2>
  <div>少看漂亮宇智波</div>
  <div id="status">🟢 在線學習</div>
  <button onclick="changeStatus()">切換狀態</button>
</div>

<!-- 🎯 任務卡片 -->
<div class="card">
  <h2>🎯 任務</h2>
  <div class="task" onclick="completeTask(this)">[ ] LeetCode</div>
  <div class="task" onclick="completeTask(this)">[ ] Java學習</div>
  <div class="task" onclick="completeTask(this)">[ ] 打遊戲</div>

  <div class="expBox">
    等級 Lv.<span id="level">1</span>
    <div class="bar">
      <div class="expBar" id="expBar"></div>
    </div>
  </div>
</div>

<!-- 📊 技能卡片 -->
<div class="card">
  <h2>📊 技能</h2>

  Java
  <div class="bar"><div class="fill" data="70"></div></div>

  英文
  <div class="bar"><div class="fill" data="50"></div></div>

  演算法
  <div class="bar"><div class="fill" data="30"></div></div>
</div>

<!-- 🎮 興趣卡片 -->
<div class="card">
  <h2>🎮 興趣</h2>
  <div>Honkai: Star Rail</div>
  <div>Genshin Impact</div>
  <div>Arknights</div>
  <div>Pikmin Bloom</div>
  <div>學習 Java</div>
  <div>看小說</div>
</div>

<!-- 🔗 連結卡片 -->
<div class="card">
  <h2>🔗 快速入口</h2>
  <a href="https://leetcode.com" target="_blank">LeetCode</a>
  <a href="https://youtube.com" target="_blank">YouTube</a>
  <a href="https://github.com" target="_blank">GitHub</a>
</div>

<!-- 📝 日誌卡片 -->
<div class="card">
  <h2>📝 日誌</h2>
  <input id="input" placeholder="寫點今天的事">
  <button onclick="addDiary()">新增</button>
  <div id="diary"></div>
</div>

</div>

<script>
// JavaScript 腳本開始

// 狀態切換變數
let states = ["🟢 在線學習","🎮 遊戲中","☕ 耍廢中"];
let s = 0;

// 切換狀態函數
function changeStatus(){
  s = (s+1)%states.length;
  document.getElementById("status").innerText = states[s];
}

// EXP系統變數
let exp = 0;
let level = 1;

// 完成任務函數
function completeTask(el){
  if(el.classList.contains("done")) return;

  el.classList.add("done");
  exp += 20;

  if(exp >= 100){
    exp = 0;
    level++;
    alert("🎉 升級！現在 Lv." + level);
  }

  document.getElementById("level").innerText = level;
  document.getElementById("expBar").style.width = exp + "%";
}

// 日誌函數
function addDiary(){
  let input = document.getElementById("input");
  if(input.value.trim() === "") return;

  let div = document.createElement("div");
  div.innerText = input.value;
  document.getElementById("diary").prepend(div);

  input.value = "";
}

// 頁面載入後執行技能動畫
window.onload = ()=>{
  document.querySelectorAll(".fill").forEach(bar=>{
    bar.style.width = bar.getAttribute("data") + "%";
  });
}
</script>

</body>
<!-- 頁面主體結束 -->
</html>
<!-- HTML 文件結束 -->
