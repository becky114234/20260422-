<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 介紹範例</title>
</head>
<body>
    <h1>歡迎來到 HTML 介紹頁面</h1>
    <p>這是一個簡單的 HTML 頁面範例，用來介紹基本的 HTML 元素。</p>
    
    <h2>標題範例</h2>
    <h3>這是 h3 標題</h3>
    <h4>這是 h4 標題</h4>
    
    <h2>段落和列表</h2>
    <p>HTML 允許您創建段落文字。</p>
    <ul>
        <li>無序列表項目 1</li>
        <li>無序列表項目 2</li>
        <li>無序列表項目 3</li>
    </ul>
    
    <ol>
        <li>有序列表項目 1</li>
        <li>有序列表項目 2</li>
        <li>有序列表項目 3</li>
    </ol>
    
    <h2>連結和圖片</h2>
    <p>這是一個 <a href="https://www.example.com">範例連結</a>。</p>
    <img src="https://via.placeholder.com/150" alt="範例圖片">
    
    <h2>表格範例</h2>
    <table border="1">
        <tr>
            <th>欄位 1</th>
            <th>欄位 2</th>
        </tr>
        <tr>
            <td>資料 1</td>
            <td>資料 2</td>
        </tr>
        <tr>
            <td>資料 3</td>
            <td>資料 4</td>
        </tr>
    </table>
</body>
</html>
